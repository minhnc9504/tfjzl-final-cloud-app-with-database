<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site administration | Django site admin</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: "Roboto", "Lucida Grande", Verdana, Arial, sans-serif; }
        .header { background: #417690; color: #ffc; padding: 10px 20px; mb-4; }
        .app-section { background: #fff; border: 1px solid #ccc; margin-bottom: 20px; }
        .app-title { background: #79aec8; color: #fff; padding: 8px 15px; font-weight: bold; }
        .model-row { border-bottom: 1px solid #eee; padding: 8px 15px; display: flex; justify-content: space-between; }
        .model-row:last-child { border-bottom: none; }
        .add-link { color: #447e9b; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="header">
    <div class="container-fluid d-flex justify-content-between">
        <h1 class="h4">Django Administration</h1>
        <div>Welcome, <strong>admin</strong>. <a href="#" class="text-white ml-2">View site</a> / <a href="#" class="text-white">Log out</a></div>
    </div>
</div>

<div class="container mt-4">
    <h2 class="h5 mb-4">Site administration</h2>

    <div class="app-section shadow-sm">
        <div class="app-title text-uppercase">Authentication and Authorization</div>
        <div class="model-row">
            <a href="#">Groups</a>
            <a href="#" class="add-link">+ Add</a>
        </div>
        <div class="model-row">
            <a href="#">Users</a>
            <a href="#" class="add-link">+ Add</a>
        </div>
    </div>

    <div class="app-section shadow-sm">
        <div class="app-title text-uppercase">Onlinecourse</div>
        <div class="model-row">
            <a href="#">Courses</a>
            <a href="#" class="add-link">+ Add</a>
        </div>
        <div class="model-row">
            <a href="#">Lessons</a>
            <a href="#" class="add-link">+ Add</a>
        </div>
        <div class="model-row">
            <a href="#">Questions</a>
            <a href="#" class="add-link">+ Add</a>
        </div>
        <div class="model-row">
            <a href="#">Choices</a>
            <a href="#" class="add-link">+ Add</a>
        </div>
        <div class="model-row">
            <a href="#">Submissions</a>
            <a href="#" class="add-link">+ Add</a>
        </div>
        <div class="model-row">
            <a href="#">Enrollments</a>
            <a href="#" class="add-link">+ Add</a>
        </div>
    </div>
</div>

<footer class="text-center mt-5 text-muted" style="font-size: 0.8rem;">
    Django Administration Interface Simulation
</footer>

</body>
</html>
